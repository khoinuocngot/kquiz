<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="cache-control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>KQuiz Reset Cache</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: #1f2937; background: #eef2ff; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; }
    main { width: min(100%, 380px); padding: 24px; border-radius: 24px; background: white; box-shadow: 0 18px 50px rgba(31,41,55,.16); }
    h1 { margin: 0 0 8px; font-size: 24px; line-height: 1.15; }
    p { margin: 0; color: #6b7280; line-height: 1.45; }
    .bar { height: 10px; margin-top: 18px; border-radius: 999px; background: #e7ebff; overflow: hidden; }
    .bar span { display: block; width: 45%; height: 100%; border-radius: inherit; background: #5b6cff; animation: load 1.1s ease-in-out infinite alternate; }
    @keyframes load { from { transform: translateX(-30%); } to { transform: translateX(160%); } }
  </style>
</head>
<body>
  <main>
    <h1>Đang làm mới KQuiz</h1>
    <p>Đang xóa cache cũ và mở lại phiên bản mới nhất.</p>
    <div class="bar"><span></span></div>
  </main>
  <script>
    (async () => {
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch (error) {
        console.warn("KQuiz reset cache failed", error);
      } finally {
        location.replace("./?v=web-1.3.11&fresh=" + Date.now() + "#/tools-hub");
      }
    })();
  </script>
</body>
</html>
